services:
  app:
    build:
      context: .
    working_dir: /application
    volumes:
      - ./app:/application

  nginx:
    image: nginx:latest
    ports:
      - 8080:80
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./app:/application
    links:
      - app

networks:
  default:
    name: dev
    external: true