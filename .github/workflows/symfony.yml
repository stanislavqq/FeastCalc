name: Symfony

on:
  push:
    branches: [ "main" ]

jobs:

  deploy:
    name: run pull
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: | 
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} > ~/.ssh/known_hosts

      - name: Deploy to server
        run: ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /services/feast_calc && git pull origin main && docker compose up -d --build --force-recreate"
      - name: cleanup
        run: rm -rf ~/.ssh