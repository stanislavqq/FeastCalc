name: Symfony

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: run pull
    runs-on: ubuntu-latest

    steps:
      - name: start deploy
        run: |
          curl https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage -d "text=Начал деплой feastCalc" -d "chat_id=${{ secrets.CHAT_ID }}"

      - name: Checkout code
        uses: actions/checkout@v3

#      - name: Set up SSH
#        run: |
#          install -m 600 -D /dev/null ~/.ssh/id_rsa
#          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
#          ssh-keyscan -H ${{ secrets.SERVER_HOST }} > ~/.ssh/known_hosts

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /services/feast_calc
            git pull origin main
          
            echo APP_ENV=prod >> app/.env.local
            echo FISCAL_TOKEN=${{ secrets.FISCAL_TOKEN }} >> app/.env.local
          
            docker compose up -d --build --force-recreate
        

      - name: success message
        run: |
          curl https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage -d "text=Деплой feast_calc завершен" -d "chat_id=${{ secrets.CHAT_ID }}"

